<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Twin3 Banner Studio</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React, ReactDOM 與 Babel (讓瀏覽器能直接讀取 JSX) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 載入 html2canvas (用於截圖下載) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { margin: 0; background-color: #030712; }
    /* 避免字體載入閃爍 */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
    #root { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 內建 SVG 圖示 (取代 lucide-react) ---
    const IconGlobe = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>);
    const IconLayoutTemplate = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="7" rx="2" ry="2"/><rect x="3" y="14" width="9" height="7" rx="2" ry="2"/><rect x="16" y="14" width="5" height="7" rx="2" ry="2"/></svg>);
    const IconWand2 = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></svg>);
    const IconImage = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>);
    const IconLoader2 = ({ className }) => (<svg className={`animate-spin ${className}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);
    const IconSettings = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>);
    const IconType = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>);
    const IconMaximize = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>);
    const IconDownload = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);

    // --- 主要 App 組件 ---
    function Twin3BannerStudio() {
      // State Management
      const [language, setLanguage] = useState('en'); 
      const [apiKey, setApiKey] = useState('');
      const [prompt, setPrompt] = useState('');
      const [advancedPrompt, setAdvancedPrompt] = useState('');
      const [statusKey, setStatusKey] = useState(''); 
      const [errorKey, setErrorKey] = useState(''); 
      const [isGenerating, setIsGenerating] = useState(false);
      const [bgImage, setBgImage] = useState(null);

      // Design System States
      const [aspectRatio, setAspectRatio] = useState('5/2');
      const [template, setTemplate] = useState('feature');
      const [logoPosition, setLogoPosition] = useState('top-left');
      
      const [headline, setHeadline] = useState('twin3 Is Infrastructure.');
      const [subheadline, setSubheadline] = useState('Building the foundation for AI-native human contribution.');
      const [ctaText, setCtaText] = useState('Learn More');

      const bannerRef = useRef(null);

      // Translation Dictionary
      const t = {
        en: {
          title: "Twin3 Studio",
          subtitle: "Automated Banner Layout System",
          step1Title: "1. AI Background Gen",
          apiKeyPlaceholder: "Enter Gemini API Key",
          promptLabel: "Enter simple concept",
          promptPlaceholder: "e.g., A glowing brain",
          enhancedPromptLabel: "Twin3 Auto-Enhanced Prompt:",
          generateBtn: "Start Auto-Generation",
          generatingBtn: "Processing...",
          step2Title: "2. Layout Settings",
          aspectRatio: "Aspect Ratio",
          widescreen: "Widescreen (16:9)",
          square: "Square (1:1)",
          template: "Layout Template",
          feature: "Feature (Left-aligned)",
          event: "Event (Centered)",
          milestone: "Milestone (Split)",
          logoPosition: "Logo Position",
          topLeft: "Top Left",
          topRight: "Top Right",
          bottomLeft: "Bottom Left",
          bottomRight: "Bottom Right",
          step3Title: "3. Typography Content",
          headline: "Headline",
          subheadline: "Subheadline",
          ctaText: "CTA Text / Label",
          previewTitle: "Live Preview",
          exportBtn: "Export High-Res PNG",
          hint: "💡 Hint: This canvas uses Flexbox for true Auto Layout. Text will automatically adapt without overlapping. Exported images will auto-crop AI watermarks.",
          statusStep1: "Step 1/2: Twin3 Brain is enhancing the prompt...",
          statusStep2: "Step 2/2: AI is rendering a high-quality 3D image...",
          errorNoKey: "Please enter your Gemini API Key first.",
          errorNoPrompt: "Please enter a concept (e.g., a glowing folder).",
          errorExpand: "Failed to expand prompt. Check API Key or Network.",
          errorGen: "Failed to generate image. Check API quota or Network.",
          errorExport: "Error occurred while exporting the image.",
          errorParse: "Failed to parse image from response.",
          langToggle: "中文"
        },
        zh: {
          title: "Twin3 Studio",
          subtitle: "自動化 Banner 排版系統",
          step1Title: "1. AI 背景生成",
          apiKeyPlaceholder: "輸入 Gemini API Key",
          promptLabel: "輸入簡單概念 (中文可)",
          promptPlaceholder: "例如: 一個發光大腦",
          enhancedPromptLabel: "Twin3 自動擴寫的終極咒語：",
          generateBtn: "開始自動生成 (Prompt + 算圖)",
          generatingBtn: "處理中...",
          step2Title: "2. 版面設定 (Auto Layout)",
          aspectRatio: "尺寸比例",
          widescreen: "寬螢幕 (16:9)",
          square: "正方形 (1:1)",
          template: "排版變體",
          feature: "一般宣告 (Feature)",
          event: "活動置中 (Event)",
          milestone: "並排對比 (Milestone)",
          logoPosition: "Logo 位置",
          topLeft: "左上角",
          topRight: "右上角",
          bottomLeft: "左下角",
          bottomRight: "右下角",
          step3Title: "3. 文案內容",
          headline: "主標題 (Headline)",
          subheadline: "副標題 (Subheadline)",
          ctaText: "按鈕/標籤文字 (CTA)",
          previewTitle: "實時預覽",
          exportBtn: "匯出高畫質 PNG",
          hint: "💡 提示：此畫布使用 Flexbox 實現了真正的 Auto Layout。輸入多行文字也不會重疊。生成的圖片會自動裁切邊緣以隱藏 AI 浮水印。",
          statusStep1: "步驟 1/2：Twin3 大腦正在擴寫 Prompt...",
          statusStep2: "步驟 2/2：AI 引擎正在生成高品質 3D 圖片...",
          errorNoKey: "請先輸入 Gemini API Key",
          errorNoPrompt: "請輸入想要的畫面概念 (例如：一個發光的資料夾)",
          errorExpand: "擴寫 Prompt 失敗，請檢查 API Key 或網路狀態",
          errorGen: "生成圖片失敗，請檢查 API 配額或網路狀態",
          errorExport: "匯出圖片時發生錯誤。",
          errorParse: "無法從回應中解析出圖片",
          langToggle: "EN"
        }
      };

      const currentLang = t[language];

      const toggleLanguage = () => {
        setLanguage(prev => prev === 'en' ? 'zh' : 'en');
      };

      const handleGenerate = async () => {
        if (!apiKey) { setErrorKey('errorNoKey'); return; }
        if (!prompt) { setErrorKey('errorNoPrompt'); return; }

        setIsGenerating(true);
        setErrorKey('');
        setAdvancedPrompt('');
        setBgImage(null);

        try {
          // STEP 1: Enhance Prompt (使用 gemini-1.5-flash)
          setStatusKey('statusStep1');
          
          const textPayload = {
            systemInstruction: {
              parts: [{ text: "You are the Twin3 Visual Prompt Expert. The user will give you a short concept in Chinese or English. Your job is to convert this into a master-level text-to-image prompt in English. MANDATORY BRAND CONSTRAINTS: 1. Deep navy blue background (#0A1128). 2. Main object must be 3D isometric, made of frosted glass and matte plastic. 3. Must emit a warm, glowing bright orange/amber light. 4. High-end tech vibe, minimalist, clean studio lighting, Octane Render, 8k resolution. Output ONLY the English prompt text, no other conversational words." }]
            },
            contents: [{ parts: [{ text: prompt }] }]
          };

          const textResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(textPayload)
          });

          if (!textResponse.ok) throw new Error('errorExpand');
          
          const textResult = await textResponse.json();
          const generatedPrompt = textResult.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
          
          if (!generatedPrompt) throw new Error('errorExpand');
          setAdvancedPrompt(generatedPrompt);

          // STEP 2: Generate Image (使用 imagen-3.0-generate-001)
          setStatusKey('statusStep2');

          const imagePayload = {
            instances: [{ prompt: generatedPrompt }],
            parameters: { sampleCount: 1 }
          };

          const imageResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(imagePayload)
          });

          if (!imageResponse.ok) throw new Error('errorGen');

          const imageResult = await imageResponse.json();
          const base64Data = imageResult.predictions?.[0]?.bytesBase64Encoded;

          if (base64Data) {
            setBgImage(`data:image/png;base64,${base64Data}`);
          } else {
            throw new Error('errorParse');
          }
        } catch (err) {
          setErrorKey(err.message || 'errorGen');
        } finally {
          setIsGenerating(false);
          setStatusKey('');
        }
      };

      const downloadBanner = async () => {
        if (!bannerRef.current || !window.html2canvas) return;
        try {
          const canvas = await window.html2canvas(bannerRef.current, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#0a1128'
          });
          const link = document.createElement('a');
          link.download = `twin3-banner-${Date.now()}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch (err) {
          console.error(err);
          setErrorKey('errorExport');
        }
      };

      const getLogoClasses = () => {
        switch (logoPosition) {
          case 'top-left': return 'top-6 left-8';
          case 'top-right': return 'top-6 right-8';
          case 'bottom-left': return 'bottom-6 left-8';
          case 'bottom-right': return 'bottom-6 right-8';
          default: return 'top-6 left-8';
        }
      };

      const getAspectRatioClass = () => {
        switch (aspectRatio) {
          case '16/9': return 'aspect-video';
          case '1/1': return 'aspect-square';
          case '5/2': return 'aspect-[5/2]';
          default: return 'aspect-[5/2]';
        }
      };

      return (
        <div className="min-h-screen bg-gray-950 text-gray-200 flex flex-col md:flex-row">
          {/* Left Sidebar */}
          <div className="w-full md:w-96 bg-gray-900 border-r border-gray-800 p-6 overflow-y-auto shrink-0 flex flex-col gap-6 relative">
            
            <button onClick={toggleLanguage} className="absolute top-6 right-6 flex items-center gap-1.5 text-xs font-semibold bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-full transition-colors border border-gray-700">
              <IconGlobe className="w-3.5 h-3.5" />
              {currentLang.langToggle}
            </button>

            <div className="pr-16">
              <h1 className="text-2xl font-bold text-white flex items-center gap-2 mb-1">
                <IconLayoutTemplate className="w-6 h-6 text-orange-500" />
                {currentLang.title}
              </h1>
              <p className="text-sm text-gray-400">{currentLang.subtitle}</p>
            </div>

            {/* Step 1 */}
            <div className="space-y-4 bg-gray-800/50 p-4 rounded-xl border border-gray-700">
              <h2 className="text-sm font-semibold text-orange-400 uppercase tracking-wider flex items-center gap-2">
                <IconWand2 className="w-4 h-4" /> {currentLang.step1Title}
              </h2>
              <div>
                <input type="password" placeholder={currentLang.apiKeyPlaceholder} value={apiKey} onChange={(e) => setApiKey(e.target.value)} className="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-orange-500 focus:outline-none transition-colors mb-3" />
                <label className="block text-xs text-gray-500 mb-1">{currentLang.promptLabel}</label>
                <textarea placeholder={currentLang.promptPlaceholder} value={prompt} onChange={(e) => setPrompt(e.target.value)} className="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm h-12 resize-none focus:border-orange-500 focus:outline-none transition-colors mb-3" />
                {advancedPrompt && (
                  <div className="mb-3">
                    <label className="block text-xs text-orange-500 mb-1 flex items-center gap-1"><IconWand2 className="w-3 h-3" /> {currentLang.enhancedPromptLabel}</label>
                    <textarea readOnly value={advancedPrompt} className="w-full bg-gray-900 border border-orange-900/50 text-orange-200/70 rounded-lg px-3 py-2 text-xs h-20 resize-none focus:outline-none" />
                  </div>
                )}
                <button onClick={handleGenerate} disabled={isGenerating} className="w-full bg-orange-600 hover:bg-orange-500 text-white rounded-lg py-2 text-sm font-medium transition-colors flex justify-center items-center gap-2 disabled:opacity-50 mt-2">
                  {isGenerating ? <IconLoader2 className="w-4 h-4" /> : <IconImage className="w-4 h-4" />}
                  {isGenerating ? currentLang.generatingBtn : currentLang.generateBtn}
                </button>
                {statusKey && <p className="text-orange-400 text-xs mt-2 text-center animate-pulse">{currentLang[statusKey]}</p>}
                {errorKey && <p className="text-red-400 text-xs mt-2">{currentLang[errorKey]}</p>}
              </div>
            </div>

            {/* Step 2 */}
            <div className="space-y-4">
              <h2 className="text-sm font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                <IconSettings className="w-4 h-4" /> {currentLang.step2Title}
              </h2>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs text-gray-500 mb-1">{currentLang.aspectRatio}</label>
                  <select value={aspectRatio} onChange={(e) => setAspectRatio(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-orange-500 focus:outline-none">
                    <option value="5/2">Twitter (5:2)</option>
                    <option value="16/9">{currentLang.widescreen}</option>
                    <option value="1/1">{currentLang.square}</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs text-gray-500 mb-1">{currentLang.template}</label>
                  <select value={template} onChange={(e) => setTemplate(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-orange-500 focus:outline-none">
                    <option value="feature">{currentLang.feature}</option>
                    <option value="event">{currentLang.event}</option>
                    <option value="milestone">{currentLang.milestone}</option>
                  </select>
                </div>
              </div>
              <div>
                <label className="block text-xs text-gray-500 mb-1">{currentLang.logoPosition}</label>
                <select value={logoPosition} onChange={(e) => setLogoPosition(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-orange-500 focus:outline-none">
                  <option value="top-left">{currentLang.topLeft}</option>
                  <option value="top-right">{currentLang.topRight}</option>
                  <option value="bottom-left">{currentLang.bottomLeft}</option>
                  <option value="bottom-right">{currentLang.bottomRight}</option>
                </select>
              </div>
            </div>

            {/* Step 3 */}
            <div className="space-y-4">
              <h2 className="text-sm font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                <IconType className="w-4 h-4" /> {currentLang.step3Title}
              </h2>
              <div>
                <label className="block text-xs text-gray-500 mb-1">{currentLang.headline}</label>
                <textarea value={headline} onChange={(e) => setHeadline(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm h-16 resize-none focus:border-orange-500 focus:outline-none font-bold" />
              </div>
              <div>
                <label className="block text-xs text-gray-500 mb-1">{currentLang.subheadline}</label>
                <textarea value={subheadline} onChange={(e) => setSubheadline(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm h-16 resize-none focus:border-orange-500 focus:outline-none" />
              </div>
              <div>
                <label className="block text-xs text-gray-500 mb-1">{currentLang.ctaText}</label>
                <input type="text" value={ctaText} onChange={(e) => setCtaText(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-orange-500 focus:outline-none" />
              </div>
            </div>
          </div>

          {/* Right Canvas */}
          <div className="flex-1 p-8 overflow-y-auto flex flex-col items-center justify-start bg-gray-950/50">
            <div className="w-full max-w-5xl flex justify-between items-center mb-6">
              <h2 className="text-lg font-medium text-gray-300 flex items-center gap-2">
                <IconMaximize className="w-5 h-5" /> {currentLang.previewTitle}
              </h2>
              <button onClick={downloadBanner} className="bg-white text-gray-900 hover:bg-gray-200 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-lg transition-transform hover:scale-105">
                <IconDownload className="w-4 h-4" /> {currentLang.exportBtn}
              </button>
            </div>

            <div ref={bannerRef} className={`w-full max-w-5xl relative overflow-hidden bg-[#0A1128] shadow-2xl ring-1 ring-white/10 ${getAspectRatioClass()}`}>
              {bgImage ? (
                <div className="absolute inset-0 w-full h-full">
                  <img src={bgImage} alt="AI Background" className="w-full h-full object-cover scale-[1.05] translate-y-[-1%]" />
                  <div className="absolute inset-0 bg-gradient-to-r from-[#0A1128] via-[#0A1128]/70 to-transparent"></div>
                </div>
              ) : (
                <div className="absolute inset-0 w-full h-full bg-[#0A1128] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-[#0A1128] to-[#0A1128]">
                  <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px)', backgroundSize: '24px 24px' }}></div>
                </div>
              )}

              <div className={`absolute ${getLogoClasses()} z-20 flex items-center gap-2`}>
                <div className="w-6 h-6 rounded-full border-[3px] border-white flex items-center justify-center opacity-90">
                  <div className="w-2 h-2 rounded-full bg-white"></div>
                </div>
                <span className="text-white font-bold tracking-widest text-lg opacity-90">twin3</span>
              </div>

              <div className="absolute inset-0 z-10 p-12 flex flex-col justify-center pointer-events-none">
                {template === 'feature' && (
                  <div className="max-w-2xl flex flex-col gap-6 items-start">
                    <h1 className="text-5xl lg:text-7xl font-bold text-white leading-tight tracking-tight whitespace-pre-line drop-shadow-lg">{headline}</h1>
                    <p className="text-xl lg:text-2xl text-blue-100/80 font-light max-w-xl whitespace-pre-line drop-shadow">{subheadline}</p>
                    {ctaText && <div className="mt-4 px-6 py-3 border border-orange-500/50 bg-orange-500/10 backdrop-blur-md rounded-full text-orange-400 font-semibold tracking-wider text-sm shadow-[0_0_15px_rgba(255,107,0,0.3)]">{ctaText}</div>}
                  </div>
                )}
                {template === 'event' && (
                  <div className="w-full flex flex-col gap-6 items-center text-center">
                    <h1 className="text-6xl lg:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 leading-tight tracking-tighter drop-shadow-2xl uppercase">{headline}</h1>
                    <p className="text-2xl lg:text-3xl text-orange-500 font-medium tracking-widest uppercase drop-shadow-[0_0_10px_rgba(255,107,0,0.5)]">{subheadline}</p>
                    {ctaText && <div className="mt-4 text-gray-400 font-mono tracking-widest text-sm border-b border-gray-600 pb-1">{ctaText}</div>}
                  </div>
                )}
                {template === 'milestone' && (
                  <div className="w-full flex flex-row items-center justify-between gap-8 h-full">
                    <div className="flex-1 flex flex-col gap-4">
                      <h1 className="text-4xl lg:text-6xl font-bold text-white leading-tight drop-shadow-lg uppercase">{headline}</h1>
                      <p className="text-lg lg:text-xl text-gray-300 font-light drop-shadow">{subheadline}</p>
                    </div>
                    {ctaText && <div className="flex-shrink-0 bg-white/10 backdrop-blur-lg border border-white/20 p-8 rounded-2xl flex flex-col items-center justify-center min-w-[250px]"><span className="text-orange-500 font-black text-6xl drop-shadow-[0_0_20px_rgba(255,107,0,0.6)]">{ctaText}</span></div>}
                  </div>
                )}
              </div>
            </div>
            
            <div className="mt-8 max-w-2xl text-center text-gray-500 text-sm">{currentLang.hint}</div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Twin3BannerStudio />);
  </script>
</body>
</html>
